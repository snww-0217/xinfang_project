{% load static %}
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>后台管理面板</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- 引入 Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- 引入自定义样式 -->
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    <!-- 引入 image_list 的 CSS 样式 -->
    <link rel="stylesheet" href="{% static 'css/image_list.css' %}">
</head>
<body>
<div class="d-flex">
    <!-- 左侧导航栏 -->
    <div class="sidebar p-3">
        <h4 class="text-white">管理后台</h4>
        <a href="#" onclick="showSection('uploadImages')">上传图片</a>
        <a href="{% url 'image_list' %}">图片列表</a>	
        <a href="#" onclick="alert('功能开发中')">其他功能</a>
    </div>

    <!-- 右侧内容区 -->
    <div class="content flex-grow-1">
        {% include "consultation/upload_forms.html" %}
        
        <!-- 引入 image_list 的 HTML 文件 -->
        {% include "consultation/image_list.html" %}
    </div>
</div>

<!-- 引入 Bootstrap 的 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- 引入 image_list 的 JavaScript 文件 -->
<script>
    console.log("{% static 'js/image_list.js' %}");
</script>

<script src="{% static 'js/image_list.js' %}"></script>
<script src="{% static 'js/upload_forms.js' %}"></script>
</body>
</html>
