{% load static %}

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Please state your question</title>

    <!-- 引用独立的 CSS 样式 -->
    <link rel="stylesheet" href="{% static 'css/ask_question.css' %}">
    <!-- 引用 Bootstrap 样式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="ask-question-bg">

    <div class="container py-5">
        <h1 class="text-center mb-4 text-primary">Please state your question</h1>

        <!-- 表单 -->
        <form method="post" class="form-container">
            {% csrf_token %}
            
            <div class="form-group mb-4">
                {{ form.as_p }}
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-success btn-lg">提交</button>
            </div>
            <div>
                <!-- 返回按钮（使用 <a> 标签） -->
               <a href="/consultation/questions/" class="btn btn-secondary btn-lg mt-2">⬅️</a>
           </div>
        </form>
    </div>

    <!-- 引用 Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
