<div id="uploadImages" class="hidden">
    <div class="container mt-5">
        <h2 class="text-center">多图片上传</h2>
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="fileInput" class="form-label">选择图片（最多 3 张）</label>
                <input class="form-control" type="file" id="fileInput" name="files" multiple accept="image/*">
            </div>
            <div class="preview"></div>
            <button type="submit" class="btn btn-primary w-100 mt-3">上传</button>
        </form>
        <div id="message" class="mt-3"></div>
    </div>
</div>
