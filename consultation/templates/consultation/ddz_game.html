<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>斗地主小游戏</title>
    <style>
        .player {
            margin-bottom: 20px;
        }
        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .card {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #fffbe6;
            font-size: 18px;
        }
        #bottom {
            margin-top: 20px;
            font-weight: bold;
        }
        button {
            padding: 8px 16px;
            font-size: 16px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>斗地主 - 发牌系统</h1>
    <button onclick="dealCards()">重新发牌</button>

    <div class="player" id="player1"><h2>玩家 1</h2><div class="cards" id="cards1"></div></div>
    <div class="player" id="player2"><h2>玩家 2</h2><div class="cards" id="cards2"></div></div>
    <div class="player" id="player3"><h2>玩家 3</h2><div class="cards" id="cards3"></div></div>
    <div id="bottom">底牌：<span id="bottomCards"></span></div>

    <script>
        function dealCards() {
            fetch('/consultation/deal/')
                .then(response => response.json())
                .then(data => {
                    renderCards('cards1', data.player1);
                    renderCards('cards2', data.player2);
                    renderCards('cards3', data.player3);
                    document.getElementById('bottomCards').innerText = data.bottom.join(', ');
                });
        }

        function renderCards(containerId, cards) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            cards.forEach(card => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerText = card;
                container.appendChild(div);
            });
        }

        window.onload = dealCards;
    </script>
</body>
</html>
